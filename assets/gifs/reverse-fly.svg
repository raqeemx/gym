<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="خلف الكتف — ادفع الذراعين للخلف">
  <defs>
    <linearGradient id="bg-rev" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#10131A"/>
    </linearGradient>
    <linearGradient id="acc-rev" x1="0" x2="1">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="1" stop-color="#EDCA7A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" rx="10" fill="url(#bg-rev)"/>
  <!-- Front chest pad (user faces it) -->
  <rect x="128" y="55" width="10" height="44" rx="3" fill="#3A3F4B"/>
  <rect x="125" y="100" width="50" height="6" rx="2" fill="#3A3F4B"/>
  <!-- Body (facing machine) -->
  <circle cx="115" cy="60" r="9" fill="#DEE0E6"/>
  <rect x="108" y="69" width="14" height="34" rx="3" fill="#DEE0E6"/>
  <!-- Arms pushing back to side -->
  <line x1="108" y1="76" x2="65" y2="65" stroke="#FFB85A" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="115;65;115" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="122" y1="76" x2="65" y2="92" stroke="#FFB85A" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="115;65;115" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Handles -->
  <circle cx="65" cy="65" r="4" fill="url(#acc-rev)">
    <animate attributeName="cx" values="115;65;115" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="92" r="4" fill="url(#acc-rev)">
    <animate attributeName="cx" values="115;65;115" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Back arrow -->
  <path d="M 50 78 L 30 78 M 35 73 L 30 78 L 35 83" stroke="#5AE68A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="20" font-family="Outfit, sans-serif" font-size="11" font-weight="700" fill="#D4A853" text-anchor="middle">REVERSE FLY</text>
  <text x="100" y="132" font-family="Rubik, sans-serif" font-size="9" fill="#9CA4B5" text-anchor="middle">افتح صدرك · ادفع للخلف · ٥ كجم</text>
</svg>
