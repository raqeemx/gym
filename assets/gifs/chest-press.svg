<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="ضغط صدر — ادفع المقابض للأمام واستعد ببطء">
  <defs>
    <linearGradient id="bg-chest" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#10131A"/>
    </linearGradient>
    <linearGradient id="acc-chest" x1="0" x2="1">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="1" stop-color="#EDCA7A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" rx="10" fill="url(#bg-chest)"/>
  <!-- Bench seat -->
  <rect x="40" y="92" width="120" height="6" rx="2" fill="#3A3F4B"/>
  <rect x="55" y="98" width="10" height="20" fill="#2A2F38"/>
  <rect x="135" y="98" width="10" height="20" fill="#2A2F38"/>
  <!-- Back support -->
  <rect x="35" y="55" width="14" height="40" rx="3" fill="#3A3F4B"/>
  <!-- Body silhouette -->
  <circle cx="55" cy="50" r="8" fill="#DEE0E6"/>
  <rect x="52" y="58" width="6" height="34" rx="2" fill="#DEE0E6"/>
  <!-- Arms (animated push) -->
  <line x1="55" y1="63" x2="100" y2="65" stroke="#FF5A5F" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="100;140;100" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="55" y1="73" x2="100" y2="75" stroke="#FF5A5F" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="100;140;100" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Handles -->
  <circle cx="100" cy="70" r="5" fill="url(#acc-chest)">
    <animate attributeName="cx" values="100;140;100" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Motion arrow -->
  <path d="M 145 70 L 175 70" stroke="#5AE68A" stroke-width="2" stroke-dasharray="3 3"/>
  <path d="M 170 65 L 175 70 L 170 75" stroke="#5AE68A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="20" font-family="Outfit, sans-serif" font-size="11" font-weight="700" fill="#D4A853" text-anchor="middle">CHEST PRESS</text>
  <text x="100" y="132" font-family="Rubik, sans-serif" font-size="9" fill="#9CA4B5" text-anchor="middle">ادفع للأمام · ارجع ببطء</text>
</svg>
