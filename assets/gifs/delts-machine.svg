<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="رفع جانبي — ارفع الذراعين للجانب">
  <defs>
    <linearGradient id="bg-delts" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#10131A"/>
    </linearGradient>
    <linearGradient id="acc-delts" x1="0" x2="1">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="1" stop-color="#EDCA7A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" rx="10" fill="url(#bg-delts)"/>
  <rect x="85" y="100" width="30" height="6" rx="2" fill="#3A3F4B"/>
  <!-- Body (front) -->
  <circle cx="100" cy="48" r="9" fill="#DEE0E6"/>
  <rect x="93" y="57" width="14" height="40" rx="3" fill="#DEE0E6"/>
  <!-- Arms swinging up to side -->
  <g>
    <line x1="93" y1="65" x2="65" y2="92" stroke="#FFB85A" stroke-width="4" stroke-linecap="round">
      <animate attributeName="x2" values="65;55;65" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="92;65;92" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="107" y1="65" x2="135" y2="92" stroke="#FFB85A" stroke-width="4" stroke-linecap="round">
      <animate attributeName="x2" values="135;145;135" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="92;65;92" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Pads -->
  <circle cx="65" cy="92" r="4" fill="url(#acc-delts)">
    <animate attributeName="cx" values="65;55;65" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="92;65;92" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="92" r="4" fill="url(#acc-delts)">
    <animate attributeName="cx" values="135;145;135" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="92;65;92" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Side arrows -->
  <path d="M 45 65 L 25 65 M 30 60 L 25 65 L 30 70" stroke="#5AE68A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 155 65 L 175 65 M 170 60 L 175 65 L 170 70" stroke="#5AE68A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="20" font-family="Outfit, sans-serif" font-size="11" font-weight="700" fill="#D4A853" text-anchor="middle">DELTS MACHINE</text>
  <text x="100" y="132" font-family="Rubik, sans-serif" font-size="9" fill="#9CA4B5" text-anchor="middle">ارفع للجانب · لا تتعدّى مستوى الكتف</text>
</svg>
