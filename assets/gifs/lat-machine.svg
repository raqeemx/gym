<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="سحب عمودي — اسحب البار للصدر">
  <defs>
    <linearGradient id="bg-lat" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#10131A"/>
    </linearGradient>
    <linearGradient id="acc-lat" x1="0" x2="1">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="1" stop-color="#EDCA7A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" rx="10" fill="url(#bg-lat)"/>
  <!-- Top pulley anchor -->
  <rect x="95" y="25" width="10" height="12" fill="#3A3F4B"/>
  <line x1="100" y1="37" x2="100" y2="58" stroke="#5AB4FF" stroke-width="2" opacity=".5">
    <animate attributeName="y2" values="58;65;58" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Bar (wide grip) -->
  <line x1="70" y1="58" x2="130" y2="58" stroke="url(#acc-lat)" stroke-width="5" stroke-linecap="round">
    <animate attributeName="y1" values="58;88;58" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="58;88;58" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Seat -->
  <rect x="80" y="105" width="40" height="6" rx="2" fill="#3A3F4B"/>
  <rect x="75" y="111" width="50" height="14" fill="#2A2F38"/>
  <!-- Body -->
  <circle cx="100" cy="80" r="9" fill="#DEE0E6"/>
  <rect x="93" y="89" width="14" height="20" rx="3" fill="#DEE0E6"/>
  <!-- Arms pulling down -->
  <line x1="93" y1="92" x2="70" y2="58" stroke="#5AB4FF" stroke-width="4" stroke-linecap="round">
    <animate attributeName="y2" values="58;88;58" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="107" y1="92" x2="130" y2="58" stroke="#5AB4FF" stroke-width="4" stroke-linecap="round">
    <animate attributeName="y2" values="58;88;58" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Down arrow -->
  <path d="M 55 75 L 55 95" stroke="#5AE68A" stroke-width="2" stroke-dasharray="3 3"/>
  <path d="M 50 90 L 55 95 L 60 90" stroke="#5AE68A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="20" font-family="Outfit, sans-serif" font-size="11" font-weight="700" fill="#D4A853" text-anchor="middle">LAT MACHINE</text>
  <text x="100" y="135" font-family="Rubik, sans-serif" font-size="9" fill="#9CA4B5" text-anchor="middle">اسحب للصدر · كوع يدخل جيبك</text>
</svg>
