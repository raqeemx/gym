<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="تفتيح صدر — جيب الذراعين أمام الصدر">
  <defs>
    <linearGradient id="bg-fly" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#10131A"/>
    </linearGradient>
    <linearGradient id="acc-fly" x1="0" x2="1">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="1" stop-color="#EDCA7A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" rx="10" fill="url(#bg-fly)"/>
  <!-- Bench (front view) -->
  <rect x="85" y="100" width="30" height="6" rx="2" fill="#3A3F4B"/>
  <!-- Body (front view) -->
  <circle cx="100" cy="45" r="9" fill="#DEE0E6"/>
  <rect x="93" y="54" width="14" height="48" rx="3" fill="#DEE0E6"/>
  <!-- Arms — sweep horizontally (animated) -->
  <line x1="100" y1="65" x2="60" y2="70" stroke="#FF5A5F" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="60;100;60" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="65" x2="140" y2="70" stroke="#FF5A5F" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="140;100;140" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Hand grips -->
  <circle cx="60" cy="70" r="4" fill="url(#acc-fly)">
    <animate attributeName="cx" values="60;100;60" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="70" r="4" fill="url(#acc-fly)">
    <animate attributeName="cx" values="140;100;140" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Motion arcs -->
  <path d="M 50 80 Q 100 95 150 80" stroke="#5AE68A" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <text x="100" y="20" font-family="Outfit, sans-serif" font-size="11" font-weight="700" fill="#D4A853" text-anchor="middle">PECTORAL FLY</text>
  <text x="100" y="132" font-family="Rubik, sans-serif" font-size="9" fill="#9CA4B5" text-anchor="middle">جيب للأمام · افتح ببطء</text>
</svg>
