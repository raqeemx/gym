<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="سحب أفقي — اسحب المقابض لصدرك">
  <defs>
    <linearGradient id="bg-row" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#10131A"/>
    </linearGradient>
    <linearGradient id="acc-row" x1="0" x2="1">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="1" stop-color="#EDCA7A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" rx="10" fill="url(#bg-row)"/>
  <!-- Front chest pad -->
  <rect x="62" y="55" width="10" height="44" rx="3" fill="#3A3F4B"/>
  <!-- Seat -->
  <rect x="65" y="100" width="50" height="6" rx="2" fill="#3A3F4B"/>
  <!-- Body (side view) -->
  <circle cx="90" cy="60" r="9" fill="#DEE0E6"/>
  <rect x="83" y="69" width="14" height="34" rx="3" fill="#DEE0E6"/>
  <!-- Cable from front -->
  <line x1="80" y1="78" x2="170" y2="78" stroke="#5AB4FF" stroke-width="2" opacity=".5">
    <animate attributeName="x1" values="80;110;80" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Arms pulling toward body -->
  <line x1="97" y1="78" x2="155" y2="78" stroke="#5AB4FF" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="155;110;155" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Handle -->
  <circle cx="155" cy="78" r="5" fill="url(#acc-row)">
    <animate attributeName="cx" values="155;110;155" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Direction arrow -->
  <path d="M 165 95 L 145 95 M 150 90 L 145 95 L 150 100" stroke="#5AE68A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="20" font-family="Outfit, sans-serif" font-size="11" font-weight="700" fill="#D4A853" text-anchor="middle">LOW ROW</text>
  <text x="100" y="132" font-family="Rubik, sans-serif" font-size="9" fill="#9CA4B5" text-anchor="middle">اجمع لوحي الظهر · اسحب لصدرك</text>
</svg>
