<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" role="img" aria-label="ضغط أكتاف — ادفع المقابض لفوق">
  <defs>
    <linearGradient id="bg-shoulder" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0B0D11"/>
      <stop offset="1" stop-color="#10131A"/>
    </linearGradient>
    <linearGradient id="acc-shoulder" x1="0" x2="1">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="1" stop-color="#EDCA7A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" rx="10" fill="url(#bg-shoulder)"/>
  <!-- Seat -->
  <rect x="80" y="95" width="40" height="5" rx="2" fill="#3A3F4B"/>
  <rect x="85" y="100" width="30" height="20" fill="#2A2F38"/>
  <!-- Body -->
  <circle cx="100" cy="50" r="8" fill="#DEE0E6"/>
  <rect x="94" y="58" width="12" height="38" rx="2" fill="#DEE0E6"/>
  <!-- Arms going up (animated press) -->
  <line x1="94" y1="65" x2="78" y2="55" stroke="#FFB85A" stroke-width="4" stroke-linecap="round">
    <animate attributeName="y2" values="55;25;55" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="106" y1="65" x2="122" y2="55" stroke="#FFB85A" stroke-width="4" stroke-linecap="round">
    <animate attributeName="y2" values="55;25;55" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Handles -->
  <circle cx="78" cy="55" r="4" fill="url(#acc-shoulder)">
    <animate attributeName="cy" values="55;25;55" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="122" cy="55" r="4" fill="url(#acc-shoulder)">
    <animate attributeName="cy" values="55;25;55" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Up arrow -->
  <path d="M 100 85 L 100 75" stroke="#5AE68A" stroke-width="2" stroke-dasharray="3 3"/>
  <path d="M 95 80 L 100 75 L 105 80" stroke="#5AE68A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="20" font-family="Outfit, sans-serif" font-size="11" font-weight="700" fill="#D4A853" text-anchor="middle">SHOULDER PRESS</text>
  <text x="100" y="132" font-family="Rubik, sans-serif" font-size="9" fill="#9CA4B5" text-anchor="middle">ادفع لفوق · بدون قفل الكوع</text>
</svg>
