<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050608">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BULK MODE">
<meta name="mobile-web-app-capable" content="yes">
<title>BULK MODE — مدرّب التضخيم</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23050608'/%3E%3Ctext x='50' y='66' font-family='Outfit,sans-serif' font-size='48' font-weight='800' text-anchor='middle' fill='%23D4A853'%3EB%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23050608'/%3E%3Ctext x='50' y='66' font-family='Outfit,sans-serif' font-size='48' font-weight='800' text-anchor='middle' fill='%23D4A853'%3EB%3C/text%3E%3C/svg%3E">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app" id="app">

  <!-- ========== HEADER ========== -->
  <header class="app-header" id="appHeader">
    <button class="hbtn back-btn" id="backBtn" style="display:none" aria-label="رجوع">‹</button>
    <div class="brand" id="brandBtn">
      BULK MODE
      <span class="brand-sub" id="brandSub">مدرّبك الشخصي للتضخيم</span>
    </div>
    <button class="hbtn" id="menuBtn" aria-label="القائمة">⋮</button>
  </header>

  <!-- ========== HOME VIEW ========== -->
  <section class="view active" id="view-home">
    <div class="hero">
      <div class="hl"><span class="dot"></span><span>BULK MODE</span></div>
      <h1 class="fu fu1">برنامج <em>التضخيم</em> النهائي</h1>
      <p class="hsub fu fu2">سجّل تمارينك، تتبّع تقدمك، اكسر أرقامك السابقة</p>
      <div class="sbar fu fu3" id="heroStats"></div>
    </div>

    <div class="content">
      <!-- بطاقة اليوم -->
      <div id="todayBlock"></div>

      <!-- جلسة جارية إن وُجدت -->
      <div id="activeBlock"></div>

      <div class="section-title">
        <h2>أيام الأسبوع</h2><span class="line"></span>
      </div>
      <div id="daysList"></div>

      <button class="free-card" onclick="startCustomSession()">
        <div class="ico">🎯</div>
        <div class="info">
          <div class="ttl">تمرين حر</div>
          <div class="sub">اختر تمارينك بنفسك من القائمة أو أضف تمارين مخصّصة</div>
        </div>
        <span class="arrow">‹</span>
      </button>

      <div class="quick-grid">
        <button class="quick-card" onclick="Router.go('exercises')">
          <div class="qc-ico">📚</div>
          <div class="qc-text">مكتبة التمارين</div>
        </button>
        <button class="quick-card" onclick="Router.go('body')">
          <div class="qc-ico">⚖️</div>
          <div class="qc-text">وزن الجسم</div>
        </button>
        <button class="quick-card" onclick="openPlateCalc()">
          <div class="qc-ico">🧮</div>
          <div class="qc-text">حاسبة الأقراص</div>
        </button>
        <button class="quick-card" onclick="Router.go('settings')">
          <div class="qc-ico">⚙️</div>
          <div class="qc-text">الإعدادات</div>
        </button>
      </div>

      <div class="section-title">
        <h2>آخر الجلسات</h2><span class="line"></span>
      </div>
      <div id="recentList"></div>
    </div>
  </section>

  <!-- ========== DAY DETAIL VIEW ========== -->
  <section class="view" id="view-day">
    <div class="day-detail" id="dayDetail"></div>
  </section>

  <!-- ========== SESSION VIEW (التمرين الحي) ========== -->
  <section class="view" id="view-session">
    <div class="session-bar">
      <div>
        <span class="sb-time-label">المدة</span>
        <div class="sb-time" id="sbTime">00:00</div>
      </div>
      <div class="sb-progress"><div class="sb-progress-fill" id="sbProgress"></div></div>
      <div class="sb-count" id="sbCount">0/0</div>
    </div>
    <div class="content" id="sessionContent"></div>
  </section>

  <!-- ========== HISTORY/STATS VIEW ========== -->
  <section class="view" id="view-history">
    <div class="content">
      <div class="tabs">
        <button class="tab active" data-tab="history">السجل</button>
        <button class="tab" data-tab="stats">الإحصائيات</button>
      </div>
      <div id="tabHistory"></div>
      <div id="tabStats" style="display:none"></div>
    </div>
  </section>

  <!-- ========== SESSION DETAIL VIEW ========== -->
  <section class="view" id="view-session-detail">
    <div class="content" id="sessionDetailContent"></div>
  </section>

  <!-- ========== BODY WEIGHT VIEW ========== -->
  <section class="view" id="view-body">
    <div class="content" id="bodyContent"></div>
  </section>

  <!-- ========== EXERCISES LIBRARY VIEW ========== -->
  <section class="view" id="view-exercises">
    <div class="content" id="exercisesContent"></div>
  </section>

  <!-- ========== EXERCISE DETAIL VIEW ========== -->
  <section class="view" id="view-exercise">
    <div class="content" id="exerciseDetailContent"></div>
  </section>

  <!-- ========== SETTINGS VIEW ========== -->
  <section class="view" id="view-settings">
    <div class="content" id="settingsContent"></div>
  </section>

</div>

<!-- ========== BOTTOM NAV ========== -->
<nav class="bottom-nav">
  <button class="bn-btn active" data-nav="home"><span class="ic">🏠</span><span>الرئيسية</span></button>
  <button class="bn-btn" data-nav="today"><span class="ic">💪</span><span>تمرين اليوم</span></button>
  <button class="bn-btn" data-nav="history"><span class="ic">📊</span><span>السجل</span></button>
</nav>

<!-- ========== REST TIMER OVERLAY ========== -->
<div class="rest-overlay" id="restOverlay">
  <div class="rest-card">
    <div class="rest-label">⏱️ راحة</div>
    <div class="rest-time" id="restTime">90</div>
    <div class="rest-target">الهدف: <span id="restTarget">90 ثانية</span></div>
    <div class="rest-actions">
      <button class="rest-quick" data-rest="30">30</button>
      <button class="rest-quick" data-rest="60">60</button>
      <button class="rest-quick" data-rest="90">90</button>
      <button class="rest-quick" data-rest="120">120</button>
      <button class="rest-quick" data-rest="180">180</button>
    </div>
    <div class="flex-row" style="justify-content:center;gap:8px;margin-bottom:6px">
      <button class="rest-quick" id="restAdd15">+15ث</button>
      <button class="rest-quick" id="restSub15">-15ث</button>
    </div>
    <button class="rest-skip" id="restSkip">تخطّي ✕</button>
  </div>
</div>

<!-- ========== PLATE CALCULATOR MODAL ========== -->
<div class="modal" id="plateModal">
  <div class="modal-card plate-card">
    <div class="modal-title">حاسبة الأقراص</div>
    <div class="plate-inputs">
      <div>
        <label class="picker-label">الوزن المستهدف (كجم)</label>
        <input type="number" class="picker-input" id="plateTarget" inputmode="decimal" step="2.5" value="60" autocomplete="off">
      </div>
      <div>
        <label class="picker-label">وزن البار (كجم)</label>
        <select class="picker-input" id="plateBar">
          <option value="20">20</option>
          <option value="15">15</option>
          <option value="10">10</option>
          <option value="7">7</option>
          <option value="0">بدون بار (دامبل)</option>
        </select>
      </div>
    </div>
    <div class="plate-result" id="plateResult"></div>
    <button class="btn-ghost picker-close-btn" id="plateClose">إغلاق</button>
  </div>
</div>

<!-- ========== PR CELEBRATION OVERLAY ========== -->
<div class="pr-overlay" id="prOverlay">
  <canvas class="pr-confetti" id="prConfetti"></canvas>
  <div class="pr-content">
    <div class="pr-emoji">🏆</div>
    <div class="pr-title">رقم شخصي جديد</div>
    <div class="pr-list" id="prList"></div>
    <button class="btn-primary" id="prClose">رائع</button>
  </div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast" id="toast">تم الحفظ ✓</div>

<!-- ========== MODAL ========== -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-title" id="modalTitle">تأكيد</div>
    <div class="modal-text" id="modalText">هل أنت متأكد؟</div>
    <div class="modal-actions" id="modalActions">
      <button class="btn-ghost" id="modalCancel">إلغاء</button>
      <button class="btn-primary" id="modalOk">تأكيد</button>
    </div>
  </div>
</div>

<!-- ========== EXERCISE PICKER MODAL ========== -->
<div class="modal" id="pickerModal">
  <div class="modal-card picker-card">
    <div class="picker-head">
      <div class="modal-title" id="pickerTitle">اختر تمارينك</div>
      <div class="picker-count" id="pickerCount">0</div>
    </div>
    <div class="picker-tabs">
      <button class="ptab active" data-ptab="library">من القائمة</button>
      <button class="ptab" data-ptab="custom">تمرين مخصّص</button>
    </div>

    <div class="ppanel" id="ppanelLibrary">
      <input type="search" class="picker-search" id="pickerSearch" placeholder="🔍 ابحث عن تمرين..." autocomplete="off">
      <div class="picker-filters" id="pickerFilters">
        <button class="pchip active" data-filter="all">الكل</button>
        <button class="pchip" data-filter="push">💪 دفع</button>
        <button class="pchip" data-filter="pull">🔙 سحب</button>
        <button class="pchip" data-filter="legs">🦵 أرجل</button>
        <button class="pchip" data-filter="a">A فقط</button>
        <button class="pchip" data-filter="b">B فقط</button>
        <button class="pchip" data-filter="custom">⭐ مخصّص</button>
      </div>
      <div class="picker-list" id="pickerList"></div>
    </div>

    <div class="ppanel" id="ppanelCustom" style="display:none">
      <div>
        <label class="picker-label">اسم التمرين</label>
        <input type="text" class="picker-input" id="cstName" placeholder="مثال: Cable Crossover" autocomplete="off">
      </div>
      <div class="picker-row">
        <div>
          <label class="picker-label">السيتات</label>
          <input type="number" class="picker-input" id="cstSets" value="3" min="1" max="20">
        </div>
        <div>
          <label class="picker-label">التكرارات</label>
          <input type="text" class="picker-input" id="cstReps" value="10-12" autocomplete="off">
        </div>
        <div>
          <label class="picker-label">الراحة (ث)</label>
          <input type="number" class="picker-input" id="cstRest" value="60" min="0" max="600">
        </div>
      </div>
      <button class="btn-ghost" id="cstAdd">+ أضف للقائمة</button>
    </div>

    <div class="picker-footer">
      <button class="btn-ghost" id="pickerClose">إلغاء</button>
      <button class="btn-primary" id="pickerSubmit" disabled>اختر تمارين</button>
    </div>
  </div>
</div>

<script src="js/program-data.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
